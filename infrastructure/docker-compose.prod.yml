services:

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ma_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ─────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: ma_api
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS}
      DB_SSL: ${DB_SSL:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FB_APP_ID: ${FB_APP_ID:-placeholder}
      FB_APP_SECRET: ${FB_APP_SECRET:-placeholder}
      FB_GRAPH_API_VERSION: ${FB_GRAPH_API_VERSION:-v19.0}
      ZALO_OA_APP_ID: ${ZALO_OA_APP_ID:-placeholder}
      ZALO_OA_SECRET: ${ZALO_OA_SECRET:-placeholder}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-ses}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-placeholder}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@example.com}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      HEADLESS: "true"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    expose:
      - "3000"
    networks:
      - internal
      - dokploy-network

  # ── Workers (Puppeteer + Queue Processors) ──────────────────────────
  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
      target: production
    container_name: ma_workers
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS}
      DB_SSL: ${DB_SSL:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CHROME_EXECUTABLE_PATH: /usr/bin/chromium-browser
      HEADLESS: "true"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-ses}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-placeholder}
      ZALO_OA_APP_ID: ${ZALO_OA_APP_ID:-placeholder}
      ZALO_OA_SECRET: ${ZALO_OA_SECRET:-placeholder}
    shm_size: '1gb'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    networks:
      - internal

volumes:
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
